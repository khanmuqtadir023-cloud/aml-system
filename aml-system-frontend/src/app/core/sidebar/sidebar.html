<div class="flex min-h-screen bg-[#F4F7F9] font-['Inter'] antialiased">
  
  <div [class.w-0]="isSidebarClosed" [class.w-64]="!isSidebarClosed" 
       class="h-screen bg-[#002D58] flex flex-col fixed left-0 top-0 select-none z-20 text-white shadow-lg transition-all duration-300 ease-in-out overflow-hidden">
    
    <div class="h-16 px-5 flex items-center border-b border-white/5">
      <span class="text-sm font-bold tracking-tight whitespace-nowrap">SystemX AML</span>
    </div>

    <nav class="flex-1 px-3 py-4 space-y-1 overflow-y-auto">
      <div class="space-y-1">
        <button (click)="toggleMenu()" class="w-full flex items-center justify-between px-3 py-2.5 rounded-lg text-xs font-bold bg-[#003B73] text-white transition-all shadow-sm">
          <span>Watchlist Screening</span>
          <svg class="w-3 h-3 transition-transform" [class.rotate-180]="isMenuClosed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 9l-7 7-7-7"/></svg>
        </button>

        <div [class.hidden]="isMenuClosed" class="pl-4 space-y-1 pt-1">
          <a routerLink="dashboard" class="block px-3 py-2 text-[11px] font-medium text-blue-200 hover:text-white hover:bg-[#003B73] rounded-md transition-all">1- Dashboard</a>
          <a routerLink="new-screening" class="block px-3 py-2 text-[11px] font-medium text-blue-200 hover:text-white hover:bg-[#003B73] rounded-md transition-all">2- New Screening</a>
          <a routerLink="screening-results" class="block px-3 py-2 text-[11px] font-medium text-blue-200 hover:text-white hover:bg-[#003B73] rounded-md transition-all">3- Screening Results</a>
          <a routerLink="match-details" class="block px-3 py-2 text-[11px] font-medium text-blue-200 hover:text-white hover:bg-[#003B73] rounded-md transition-all">4- Match Details</a>
          <a routerLink="match-review" class="block px-3 py-2 text-[11px] font-medium text-blue-200 hover:text-white hover:bg-[#003B73] rounded-md transition-all">5- Match Review</a>
        </div>
      </div>
    </nav>
  </div>

  <div [class.pl-0]="isSidebarClosed" [class.pl-64]="!isSidebarClosed" 
       class="flex-1 flex flex-col min-h-screen transition-all duration-300 ease-in-out">
    
    <header class="h-16 border-b border-slate-200 bg-white flex items-center px-6 sticky top-0 z-30 shadow-sm">
        <button (click)="toggleSidebar()" class="text-slate-500 hover:text-[#003B73] transition-colors p-2 rounded-lg hover:bg-slate-100">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>
    </header>
    
    <main class="flex-1 p-6">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
