<div class="space-y-6 font-['Inter'] antialiased text-slate-700 animate-fade-in">
  
  <div>
    <div class="flex items-center gap-2 text-xs text-slate-400">
      <span>Watchlist Screening</span>
      <span class="text-[10px] text-slate-300">/</span>
      <span class="text-slate-500 font-medium">New Screening</span>
    </div>
    <h1 class="text-xl font-bold text-slate-900 mt-1">New Watchlist Screening</h1>
  </div>

  <div class="space-y-6">
    
    <div class="bg-white border border-slate-200 rounded-xl p-6 shadow-sm">
      <h3 class="text-sm font-bold text-slate-800 mb-5 border-b border-slate-100 pb-2">Customer Information</h3>
      
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-5">
        
        <div class="flex flex-col gap-1.5">
          <label class="text-xs font-semibold text-slate-500">Customer Type</label>
          <div class="relative">
            <select class="w-full bg-slate-50/50 border border-slate-200 rounded-lg px-3 py-2 text-xs font-medium text-slate-800 outline-none focus:border-indigo-500 appearance-none cursor-pointer">
              <option value="individual">Individual</option>
              <option value="corporate">Corporate Entity</option>
            </select>
            <div class="absolute inset-y-0 right-3 flex items-center pointer-events-none text-slate-400">
              <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" /></svg>
            </div>
          </div>
        </div>

        <div class="flex flex-col gap-1.5">
          <label class="text-xs font-semibold text-slate-500">Full Name</label>
          <input type="text" value="Muhammad Ali" placeholder="Enter full name" 
                 class="w-full bg-white border border-slate-200 rounded-lg px-3 py-2 text-xs font-medium text-slate-800 outline-none focus:border-indigo-500 transition-all shadow-inner/5" />
        </div>

        <div class="flex flex-col gap-1.5">
          <label class="text-xs font-semibold text-slate-500">Customer ID</label>
          <input type="text" value="CUST-0001254" readonly
                 class="w-full bg-slate-50 text-slate-400 border border-slate-200 rounded-lg px-3 py-2 text-xs font-mono select-none outline-none" />
        </div>

        <div class="flex flex-col gap-1.5">
          <label class="text-xs font-semibold text-slate-500">CNIC / Passport No</label>
          <input type="text" value="35202-1234567-1" placeholder="e.g. 35202-XXXXXXXX-X" 
                 class="w-full bg-white border border-slate-200 rounded-lg px-3 py-2 text-xs font-medium text-slate-800 outline-none focus:border-indigo-500 transition-all" />
        </div>

        <div class="flex flex-col gap-1.5">
          <label class="text-xs font-semibold text-slate-500">Date of Birth</label>
          <div class="relative">
            <input type="text" value="15/04/1990" placeholder="DD/MM/YYYY" 
                   class="w-full bg-white border border-slate-200 rounded-lg px-3 py-2 text-xs font-medium text-slate-800 outline-none focus:border-indigo-500 transition-all" />
            <div class="absolute inset-y-0 right-3 flex items-center pointer-events-none text-slate-400">
              <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 002-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
            </div>
          </div>
        </div>

        <div class="flex flex-col gap-1.5">
          <label class="text-xs font-semibold text-slate-500">Nationality</label>
          <div class="relative">
            <select class="w-full bg-slate-50/50 border border-slate-200 rounded-lg px-3 py-2 text-xs font-medium text-slate-800 outline-none focus:border-indigo-500 appearance-none cursor-pointer">
              <option value="PK">Pakistan</option>
              <option value="US">United States</option>
              <option value="UK">United Kingdom</option>
            </select>
            <div class="absolute inset-y-0 right-3 flex items-center pointer-events-none text-slate-400">
              <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" /></svg>
            </div>
          </div>
        </div>

        <div class="flex flex-col gap-1.5">
          <label class="text-xs font-semibold text-slate-500">Gender</label>
          <div class="relative">
            <select class="w-full bg-slate-50/50 border border-slate-200 rounded-lg px-3 py-2 text-xs font-medium text-slate-800 outline-none focus:border-indigo-500 appearance-none cursor-pointer">
              <option value="male">Male</option>
              <option value="female">Female</option>
              <option value="other">Other</option>
            </select>
            <div class="absolute inset-y-0 right-3 flex items-center pointer-events-none text-slate-400">
              <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" /></svg>
            </div>
          </div>
        </div>

        <div class="flex flex-col gap-1.5">
          <label class="text-xs font-semibold text-slate-500">Mobile Number</label>
          <input type="text" value="+92 300 1234567" placeholder="e.g. +92 3XX XXXXXXX" 
                 class="w-full bg-white border border-slate-200 rounded-lg px-3 py-2 text-xs font-medium text-slate-800 outline-none focus:border-indigo-500 transition-all" />
        </div>

      </div>
    </div>

    <div class="bg-white border border-slate-200 rounded-xl p-6 shadow-sm">
      <h3 class="text-sm font-bold text-slate-800 mb-4 border-b border-slate-100 pb-2">Screening Details</h3>
      
      <div class="space-y-4">
        <div class="flex flex-col gap-1.5">
          <label class="text-xs font-semibold text-slate-500">Select Watchlists</label>
          <div class="w-full bg-white border border-slate-200 rounded-lg p-2 min-h-[40px] flex flex-wrap gap-2 items-center relative">
            
            <span class="inline-flex items-center gap-1.5 bg-slate-100 text-slate-700 text-[11px] font-medium px-2.5 py-1 rounded-md border border-slate-200/60">
              <span>UN Consolidated List</span>
              <button class="text-slate-400 hover:text-slate-600 focus:outline-none text-[10px] font-bold">✕</button>
            </span>

            <span class="inline-flex items-center gap-1.5 bg-slate-100 text-slate-700 text-[11px] font-medium px-2.5 py-1 rounded-md border border-slate-200/60">
              <span>OFAC Sanctions List</span>
              <button class="text-slate-400 hover:text-slate-600 focus:outline-none text-[10px] font-bold">✕</button>
            </span>

            <span class="inline-flex items-center gap-1.5 bg-slate-100 text-slate-700 text-[11px] font-medium px-2.5 py-1 rounded-md border border-slate-200/60">
              <span>EU Sanctions List</span>
              <button class="text-slate-400 hover:text-slate-600 focus:outline-none text-[10px] font-bold">✕</button>
            </span>

            <span class="inline-flex items-center gap-1.5 bg-slate-100 text-slate-700 text-[11px] font-medium px-2.5 py-1 rounded-md border border-slate-200/60">
              <span>SBP Watchlist</span>
              <button class="text-slate-400 hover:text-slate-600 focus:outline-none text-[10px] font-bold">✕</button>
            </span>

            <div class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-300 hover:text-slate-500 cursor-pointer">
              <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
            </div>
          </div>
        </div>

        <div class="flex flex-col gap-1.5">
          <label class="text-xs font-semibold text-slate-500">Additional Information (Optional)</label>
          <textarea rows="3" placeholder="Type additional information..." 
                    class="w-full bg-white border border-slate-200 rounded-lg p-3 text-xs font-medium text-slate-800 outline-none focus:border-indigo-500 transition-all resize-none"></textarea>
        </div>
      </div>
    </div>

    <div class="flex justify-end items-center gap-3 pt-2">
      <button class="bg-white border border-slate-200 text-slate-600 text-xs font-bold px-5 py-2 rounded-lg hover:bg-slate-50 transition-all active:scale-[0.98]">
        Reset
      </button>
      <button class="bg-[#003B73] text-white text-xs font-bold px-5 py-2 rounded-lg hover:bg-[#002D58] shadow-sm transition-all active:scale-[0.98]">
  Start Screening
</button>
    </div>

  </div>
</div>
